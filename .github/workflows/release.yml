name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.5
        with:
          environments: build dev

      - name: Check grammar.c modification
        run: pixi run npm-install && pixi run assert-sync-scanner

      - name: Generate and test
        run: pixi run build && pixi run tests

      - name: Create release archive
        id: archive
        run: |
          VERSION="${{ needs.release-please.outputs.tag_name }}"
          ARCHIVE="/tmp/tree-sitter-snakemake-${VERSION}.tar.gz"
          tar --exclude='.git' \
              --exclude='.pixi' \
              --exclude='node_modules' \
              --exclude='.pytest_cache' \
              --exclude='**/__pycache__' \
              --exclude='.nvim-local' \
              --exclude='.parseref' \
              --exclude='nvim.log' \
              --exclude='src/scanner.c.diff' \
              --exclude='tests' \
              -czf "${ARCHIVE}" .
          echo "path=${ARCHIVE}" >> "$GITHUB_OUTPUT"

      - name: Upload release archive
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: ${{ steps.archive.outputs.path }}
