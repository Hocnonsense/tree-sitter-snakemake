name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG_VERSION="v$(jq -r .version package.json)"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "ERROR: tag '$TAG' does not match package.json version '$PKG_VERSION'" >&2
            exit 1
          fi
          echo "Version verified: $TAG"

  build:
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.5
        with:
          environments: build dev

      - name: Check grammar.c modification
        run: pixi run npm-install && pixi run assert-sync-scanner

      - name: Generate and test
        run: pixi run build && pixi run tests

      - name: Create release archive
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE="/tmp/tree-sitter-snakemake-${VERSION}.tar.gz"
          tar --exclude='.git' \
              --exclude='.pixi' \
              --exclude='node_modules' \
              --exclude='.pytest_cache' \
              --exclude='**/__pycache__' \
              --exclude='.nvim-local' \
              --exclude='.parseref' \
              --exclude='nvim.log' \
              --exclude='src/scanner.c.diff' \
              --exclude='tests' \
              -czf "${ARCHIVE}" .
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: release-archive
          path: ${{ env.ARCHIVE }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-archive

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
          files: "*.tar.gz"
