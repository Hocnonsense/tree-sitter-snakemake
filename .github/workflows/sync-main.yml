name: Sync generated main

on:
  push:
    branches:
      - build

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout build branch
        uses: actions/checkout@v4
        with:
          ref: build

      - uses: prefix-dev/setup-pixi@v0.8.5
        with:
          environments: build dev

      - name: Build and test
        run: pixi run npm-install && pixi run build

      - name: Prepare main branch content
        run: |
          sed -i '/^# build-branch-only$/,$d' .gitignore
          rm -rf \
            build_tools \
            .nvim-local \
            pixi.lock \
            release-please-config.json \
            .release-please-manifest.json \
            .github

      - name: Push to PR branch and open or update PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BUILD_SHA=$(git rev-parse --short HEAD)
          git add -A
          git fetch origin main

          # Create a commit on top of origin/main without modifying the build branch
          TREE=$(git write-tree)
          PARENT=$(git rev-parse origin/main)
          COMMIT=$(git commit-tree "$TREE" -p "$PARENT" \
            -m "chore: sync generated grammar files from build@${BUILD_SHA}")
          git push origin "${COMMIT}:refs/heads/automation/sync-generated-main" --force

          # Create PR if it doesn't exist yet
          gh pr list --head automation/sync-generated-main --json number --jq '.[0].number' \
            | grep -q . || \
          gh pr create \
            --base main \
            --head automation/sync-generated-main \
            --title "chore: sync generated grammar files" \
            --body "Generated from the latest \`build\` branch commit.

          This PR keeps \`main\` editor-ready by including generated tree-sitter files,
          final queries, and the main-branch \`.gitignore\`, while leaving build-only
          infrastructure on \`build\`."
