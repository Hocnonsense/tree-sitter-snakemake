name: Sync generated main

on:
  push:
    branches:
      - build

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout build branch
        uses: actions/checkout@v4
        with:
          ref: build

      - uses: prefix-dev/setup-pixi@v0.8.5
        with:
          environments: build dev

      - name: Build and test
        run: pixi run npm-install && pixi run build

      - name: Prepare main branch content
        run: |
          sed -i '/^# build-branch-only$/,$d' .gitignore
          sed -i '/^<!-- build-branch-only -->$/,$d' README.md
          rm -rf \
            build_tools \
            .nvim-local \
            pixi.lock \
            release-please-config.json \
            .release-please-manifest.json
          rm -f .github/workflows/ci.yml
          rm -f .github/workflows/release-please-build.yml
          rm -f .github/workflows/sync-main.yml

      - name: Push to PR branch and open or update PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BUILD_SHA=$(git rev-parse --short HEAD)
          BUILD_FULL_SHA=$(git rev-parse HEAD)
          BUILD_SUBJECT=$(git log -1 --pretty=%s)
          VERSION="$(sed -n 's/^version = "\(.*\)"$/\1/p' pyproject.toml | head -n 1)"
          IS_RELEASE_SYNC=false
          if echo "$BUILD_SUBJECT" | grep -Eq '^chore(\(.+\))?: release '; then
            IS_RELEASE_SYNC=true
          fi
          git add -A
          git fetch origin main

          # Create a commit on top of origin/main without modifying the build branch
          TREE=$(git write-tree)
          PARENT=$(git rev-parse origin/main)
          COMMIT=$(git commit-tree "$TREE" -p "$PARENT" \
            -m "chore: sync generated grammar files from build@${BUILD_SHA}" \
            -m "Source-build-commit: ${BUILD_FULL_SHA}" \
            -m "Source-build-subject: ${BUILD_SUBJECT}" \
            -m "Synced-version: ${VERSION}" \
            -m "Release-sync: ${IS_RELEASE_SYNC}")
          git push origin "${COMMIT}:refs/heads/automation/sync-generated-main" --force

          printf '%s\n' \
            "Generated from the latest \`build\` branch commit." \
            "" \
            "Source build commit: \`${BUILD_FULL_SHA}\`" \
            "Source build subject: \`${BUILD_SUBJECT}\`" \
            "Synced version: \`${VERSION}\`" \
            "Release sync: \`${IS_RELEASE_SYNC}\`" \
            "" \
            "This PR keeps \`main\` editor-ready by including generated tree-sitter files," \
            "final queries, and the main-branch \`.gitignore\`, while leaving build-only" \
            "infrastructure on \`build\`." \
            > /tmp/sync-main-pr-body.md

          if [ "$IS_RELEASE_SYNC" = true ]; then
            printf '%s\n' \
              "" \
              "Merging this PR will publish \`v${VERSION}\` from \`main\` if that release does not already exist." \
              >> /tmp/sync-main-pr-body.md
          fi

          PR_NUMBER="$(gh pr list \
            --head automation/sync-generated-main \
            --json number \
            --jq '.[0].number')"

          PR_TITLE="chore: sync generated grammar files from build@${BUILD_SHA}"
          if [ "$IS_RELEASE_SYNC" = true ]; then
            PR_TITLE="chore: sync generated grammar files for v${VERSION}"
          fi

          if [ -n "$PR_NUMBER" ]; then
            gh pr edit "$PR_NUMBER" \
              --title "$PR_TITLE" \
              --body-file /tmp/sync-main-pr-body.md
          else
            PR_URL="$(gh pr create \
              --base main \
              --head automation/sync-generated-main \
              --title "$PR_TITLE" \
              --body-file /tmp/sync-main-pr-body.md)"
            PR_NUMBER="${PR_URL##*/}"
          fi

          if [ "$IS_RELEASE_SYNC" = true ]; then
            gh pr edit "$PR_NUMBER" --add-label release-sync
          else
            gh pr edit "$PR_NUMBER" --remove-label release-sync || true
          fi
