name: CI

on:
  push:
    branches:
      - main
      - devel
  pull_request:
    branches:
      - main
      - devel

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.5
        with:
          environments: build dev
      - name: Check grammar.c modification
        run: pixi run npm-install && pixi run assert-sync-scanner
      - name: Test grammar
        run: pixi run build && pixi run test
